  <script>
const astroFacts = [
  "Neutron stars can spin more than 600 times per second.",
  "Light from the Andromeda Galaxy takes 2.5 million years to reach Earth.",
  "A teaspoon of neutron star matter would weigh about a billion tons.",
  "The James Webb Space Telescope observes galaxies from over 13 billion years ago.",
  "Black holes can warp spacetime so strongly that time slows near them.",
  "The Milky Way contains over 100 billion stars.",
  "Some exoplanets rain molten glass sideways at 7000 km/h.",
  "Gravitational waves were first detected in 2015 by LIGO."
];

const factEl = document.getElementById("astro-fact-text");
let factIndex = 0;

function rotateFact(){
  if(!factEl) return;
  factEl.textContent = astroFacts[factIndex];
  factIndex = (factIndex + 1) % astroFacts.length;
}

rotateFact();
setInterval(rotateFact, 3500);
</script>

<script>
const canvas = document.getElementById("galaxy-loader");
const ctx = canvas.getContext("2d");

const size = 220;
canvas.width = size;
canvas.height = size;

const center = size / 2;
const particles = [];
const particleCount = 250;

for(let i=0;i<particleCount;i++){
  particles.push({
    radius: Math.random()*90,
    angle: Math.random()*Math.PI*2,
    speed: 0.001 + Math.random()*0.002,
    size: Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,size,size);

  particles.forEach(p=>{
    p.angle += p.speed;

    const spiral = p.radius * 0.05;

    const x = center + (p.radius * Math.cos(p.angle + spiral));
    const y = center + (p.radius * Math.sin(p.angle + spiral));

    ctx.beginPath();
    ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fillStyle="rgba(125,211,252,0.9)";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>
