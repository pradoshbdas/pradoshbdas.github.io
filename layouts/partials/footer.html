<footer class="site-footer">
  <div class="container footer-content">
    <div class="footer-social">
      {{ range .Site.Data.footer.social }}
      <a href="{{ .href }}" class="social-btn" aria-label="{{ .label }}" target="_blank" rel="noopener noreferrer">
        <i class="{{ .icon_class }}"></i>
      </a>
      {{ end }}
    </div>
    <div class="footer-bottom">{{ .Site.Data.footer.copyright }}</div>
  </div>
</footer>
