{{ define "body" }}
<main class="research-page">
  <section class="section research-article-section">
    <div class="container">
      <div class="section-shell">
        <div class="research-page-topbar">
          <a class="back-link" href="/#research"><i class="fa-solid fa-arrow-left"></i><span>Back to Research</span></a>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">☀️</button>
        </div>
        <div class="section-head">
          <h2 id="research-page-title">{{ .Title }}</h2>
          {{ with .Params.subtitle }}<h3 class="muted" id="research-page-subtitle">{{ . }}</h3>{{ end }}
        </div>
        <article id="research-content" class="card markdown-body research-article-card">{{ .Content }}</article>
      </div>
    </div>
  </section>
</main>
{{ end }}
